name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
      - name: Build WASM core
        run: cargo build -p sotto-wasm --target wasm32-unknown-unknown
      - name: Cross-impl gate (native-produced vectors decrypt in WASM)
        run: wasm-pack test --node crates/wasm

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        run: npm ci
      - name: Dependency audit (shipped deps)
        run: npm audit --omit=dev --audit-level=high
      - name: Generate WASM bindings
        run: npm run build:wasm
      - name: Typecheck
        run: npm run typecheck
      - name: Build (vite bundle)
        run: npx vite build
      - name: WASM smoke (crypto core loads)
        run: npm run smoke

  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sotto
          POSTGRES_PASSWORD: sotto
          POSTGRES_DB: sotto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sotto"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://sotto:sotto@localhost:5432/sotto
      SOTTO_RUN_DB_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Server + end-to-end tests (with Postgres)
        run: cargo test -p sotto-server -p sotto-cli

  funnel-e2e:
    name: funnel regression suite (Launch gate 4)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sotto
          POSTGRES_PASSWORD: sotto
          POSTGRES_DB: sotto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sotto"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://sotto:sotto@localhost:5432/sotto
      # Test-mode only, if provisioned - see web/e2e/README.md § The Stripe checkout leg. Absent,
      # the spec skips that one leg with a clear reason rather than failing.
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_TEST_PRICE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build the mock-OAuth server and the seed fixture
        run: |
          cargo build -p sotto-server --features e2e-mock-oauth
          cargo build -p sotto-cli --example e2e_seed

      - name: Build the web app
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install Playwright's chromium browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Funnel regression suite
        working-directory: web
        run: npm run e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny (advisories, bans, licences, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
