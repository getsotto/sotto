# Prebuilt Docker images: build the server and web (Caddy + SPA) images for amd64 + arm64 and
# publish them to GHCR, so a deployment box only pulls - it never needs the RAM or toolchain to
# compile Rust/WASM from source (a 1 GB free-tier VM can host Sotto).
#
# Runs on release tags (published as :vX.Y.Z and :latest) and manually via workflow_dispatch
# (published as :latest from the chosen ref). Each architecture builds NATIVELY (GitHub's arm64
# runners) - no QEMU emulation, which would make the Rust release build take hours - then a
# multi-arch manifest stitches the two together.

name: images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.image }} (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - { image: sotto-server, dockerfile: Dockerfile, arch: amd64, os: ubuntu-latest }
          - { image: sotto-server, dockerfile: Dockerfile, arch: arm64, os: ubuntu-24.04-arm }
          - { image: sotto-web, dockerfile: deploy/Dockerfile.web, arch: amd64, os: ubuntu-latest }
          - { image: sotto-web, dockerfile: deploy/Dockerfile.web, arch: arm64, os: ubuntu-24.04-arm }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push a per-arch staging tag; the merge job below combines them and applies the real tags.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:stage-${{ github.run_id }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }},mode=max

  publish:
    name: publish multi-arch manifests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          set -euo pipefail
          for image in sotto-server sotto-web; do
            base="ghcr.io/${{ github.repository_owner }}/$image"
            tags=(-t "$base:latest")
            case "${{ github.ref }}" in
              refs/tags/v*) tags+=(-t "$base:${{ github.ref_name }}") ;;
            esac
            docker buildx imagetools create "${tags[@]}" \
              "$base:stage-${{ github.run_id }}-amd64" \
              "$base:stage-${{ github.run_id }}-arm64"
            docker buildx imagetools inspect "$base:latest"
          done
